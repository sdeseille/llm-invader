<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Space Invader</title>
  <style>
    body { background: #111; margin: 0; overflow: hidden; }
    canvas { background: #222; display: block; margin: 0 auto; }
  </style>
</head>
<body>
<canvas id="game" width="600" height="600"></canvas>
<script>
/* engine */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const keys = new Set();

window.addEventListener('keydown', e => {
  if (e.code === 'Space' && !gameOver) {
    shoot('player');
  }
  keys.add(e.code);
});
window.addEventListener('keyup', e => keys.delete(e.code));

/* player */
const player = {
  x: canvas.width / 2 - 24,
  y: canvas.height - 48,
  w: 48,
  h: 24,
  vx: 0
};

player.move = () => {
  if (keys.has('ArrowLeft')) {
    player.vx = -2;
  } else if (keys.has('ArrowRight')) {
    player.vx = 2;
  } else {
    player.vx = 0;
  }

  player.x += player.vx;
  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
};

player.draw = () => {
  ctx.fillStyle = '#444';
  ctx.fillRect(player.x, player.y, player.w, player.h);
};

/* enemy drawing */
function drawEnemy(enemy) {
  ctx.fillStyle = enemy.color;
  ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
}

/* enemies */
let enemies = [];
let particles = [];

const enemyTypes = [
  { w: 32, h: 32, x: 50,  y: 50, vx: 0.5, vy: 0.2,  color: '#ff6666' },
  { w: 32, h: 32, x: 150, y: 50, vx: 1.2, vy: 0.3,  color: '#ffcc00' },
  { w: 48, h: 48, x: 250, y: 50, vx: 0.3, vy: 0.05, color: '#66ff66' },
  { w: 32, h: 32, x: 50,   y: 150, vx: 0.6, vy: 0.4, color: '#9966ff' },
  { w: 32, h: 32, x: 150,  y: 150, vx: 0.8, vy: 0.5, color: '#ffff33' },
  { w: 48, h: 48, x: 250,  y: 150, vx: 0.4, vy: 0.15, color: '#00ccff' }
];

function resetWave() {
  enemies = enemyTypes.map(t => ({ ...t, alive: true }));
}
resetWave();

/* bullets */
const bullets = [];
const enemyBullets = [];

function shoot(type) {
  if (type === 'player') {
    bullets.push({ 
      x: player.x + player.w / 2 - 2, 
      y: player.y, 
      vx: 0, 
      vy: -10, 
      type: 'player',
      w: 4,
      h: 4
    });
    // play a short beep using the Web Audio API
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.value = 0.15;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.stop(ctx.currentTime + 0.15);
  }
}

function drawBullet(bullet) {
  ctx.fillStyle = bullet.type === 'player' ? '#00FF00' : '#FF0000';
  ctx.fillRect(bullet.x, bullet.y, 4, 4);
}

/* collision */
function rectCollide(a, b) {
  // a = bullet, b = enemy
  const ax = a.x;
  const ay = a.y;
  const aw = a.w;
  const ah = a.h;
  const bx = b.x;
  const by = b.y;
  const bw = b.w;
  const bh = b.h;

  return (
    ax < bx + bw &&
    ax + aw > bx &&
    ay < by + bh &&
    ay + ah > by
  );
}

/* game state */
let score = 0;
let gameOver = false;

/* particle explosion */
function createExplosion(x, y, color) {
  for (let i = 0; i < 16; i++) {
    const angle = (Math.PI * 2 * i) / 16;
    const speed = Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      w: 4, h: 4,
      color,
      life: 30
    });
  }
  // play a short explosion sound
  playExplosionSound(color);
}

function playExplosionSound(color) {
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = 120;
  gain.gain.value = 0.12;
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.stop(ctx.currentTime + 0.2);
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.w, p.h);
  });
}

/* game loop */
function update(dt) {
  if (gameOver) return;

  player.move();

  /* enemy movement + shooting */
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.x += e.vx * dt * 60;
    e.y += e.vy * dt * 60;

    // Clamp horizontal bounds and bounce if hitting edge
    if (e.x <= 0 || e.x >= canvas.width - e.w) {
      e.vx = -e.vx; // Reverse direction on hit
    }

    // Clamp vertical bounds (already handled in original logic)
    e.y = Math.max(0, Math.min(canvas.height - e.h, e.y));

    if (Math.random() < 0.005) {
      enemyBullets.push({ x: e.x + e.w / 2 - 2, y: e.y + e.h, vx: 0, vy: 5, type: 'enemy' });
    }

    if (e.y > canvas.height) {
      enemies.splice(i, 1);
    } else if (rectCollide(e, player)) {
      gameOver = true;
    }
  }

  if (enemies.length === 0) {
    resetWave();
  }

  // player bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt * 60;
    b.y += b.vy * dt * 60;
    if (b.y < 0) {
      bullets.splice(i, 1);
      continue;
    }
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (rectCollide(b, e)) {
        console.log("💥 BULLET HIT ENEMY!", {
          bullet: { x: b.x, y: b.y },
          enemy: { x: e.x, y: e.y },
          bulletW: b.w, bulletH: b.h,
          enemyW: e.w, enemyH: e.h
        });
        score += 10;
        createExplosion(e.x + e.w / 2, e.y + e.h / 2, e.color);
        enemies.splice(j, 1);
        bullets.splice(i, 1);
        break;
      }
    }
  }

  // enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx * dt * 60;
    b.y += b.vy * dt * 60;
    if (b.y > canvas.height) {
      enemyBullets.splice(i, 1);
      continue;
    }
    console.log("ENEMY BULLET HIT PLAYER!");
    if (rectCollide(b, player)) {
      createExplosion(player.x + player.w / 2, player.y + player.h / 2, '#ff0000');
      gameOver = true;
      enemyBullets.splice(i, 1);
    }
  }

  updateParticles();

  if (enemies.length === 0 && !gameOver) {
    resetWave();
  }
}

function draw() {
  ctx.fillStyle = '#222';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  player.draw();
  enemies.forEach(drawEnemy);
  bullets.forEach(drawBullet);
  enemyBullets.forEach(drawBullet);
  drawParticles();

  ctx.font = '16px sans-serif';
  if (!gameOver) {
    ctx.fillStyle = '#00FF00';
    ctx.fillText(`Score: ${score}`, 10, 20);
  } else {
    ctx.fillStyle = 'red';
    ctx.font = '32px sans-serif';
    ctx.fillText('GAME OVER', canvas.width / 2 - 90, canvas.height / 2);
    ctx.font = '16px sans-serif';
    ctx.fillText('Press Enter to restart', canvas.width / 2 - 80, canvas.height / 2 + 30);
  }
}

let paused = false;

function gameLoop() {
  if (!paused) {
    update(1 / 60);
    draw();
  }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

/* pause / restart */
window.addEventListener('keydown', e => {
  if (e.code === 'Escape') {
    paused = !paused;
    if (paused) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = '32px sans-serif';
      ctx.fillText('Paused', canvas.width / 2 - 55, canvas.height / 2);
    }
  } else if (e.code === 'Enter' && gameOver) {
    score = 0;
    gameOver = false;
    bullets.length = 0;
    enemyBullets.length = 0;
    particles.length = 0;
    player.x = canvas.width / 2 - 24;
    resetWave();
  }
});
</script>
</body>
</html>
