<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Space Invader</title>
  <style>
    body { background: #111; margin: 0; overflow: hidden; }
    canvas { background: #222; display: block; margin: 0 auto; }
  </style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<script>
/* engine */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const keys = new Set();

window.addEventListener('keydown', e => {
  if (e.code === 'Space' && !gameOver) {
    shoot('player');
  }
  keys.add(e.code);
});
window.addEventListener('keyup', e => keys.delete(e.code));

/* player */
const player = {
  x: canvas.width / 2 - 24,
  y: canvas.height - 48,
  w: 48,
  h: 24,
  vx: 0
};

player.move = () => {
  if (keys.has('ArrowLeft')) {
    player.vx = -2;
  } else if (keys.has('ArrowRight')) {
    player.vx = 2;
  } else {
    player.vx = 0;
  }

  player.x += player.vx;
  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
};

player.draw = () => {
  ctx.fillStyle = '#444';
  ctx.fillRect(player.x, player.y, player.w, player.h);
};

/* enemy drawing */
function drawEnemy(enemy) {
  ctx.fillStyle = enemy.color;
  if (enemy.shape === 'circle') {
    ctx.beginPath();
    ctx.arc(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, 16, 0, Math.PI * 2);
    ctx.fill();
  } else if (enemy.shape === 'triangle') {
    const cx = enemy.x + enemy.w / 2;
    const cy = enemy.y + enemy.h / 2;
    ctx.beginPath();
    ctx.moveTo(cx, enemy.y);
    ctx.lineTo(cx + enemy.w / 2, enemy.y + enemy.h);
    ctx.lineTo(cx - enemy.w / 2, enemy.y + enemy.h);
    ctx.closePath();
    ctx.fill();
  }  else if (enemy.shape === 'triangle_down') {
    const cx = enemy.x + enemy.w / 2;
    const cy = enemy.y + enemy.h / 2;
    ctx.beginPath();
    ctx.moveTo(cx - enemy.w / 2, enemy.y);
    ctx.lineTo(cx + enemy.w / 2, enemy.y);
    ctx.lineTo(cx, enemy.y + enemy.h);
    ctx.closePath();
    ctx.fill();
  } else {
    // square
    ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
  }
}

/* enemies */
let enemies = [];
let particles = [];

const enemyShapes = ['circle', 'triangle', 'triangle_down', 'square'];
const enemyColors = ['#ff66aa', '#aaffcc', '#cc99ff', '#ddbb88', '#88ffbb', '#ffdd88', '#88aadd', '#ffff88'];

function createEnemies() {
  enemies = [];
  for (let s of enemyShapes) {
    for (let i = 0; i < 8; i++) {
      let x, y;
      const cols = i;
      const rows = enemyShapes.indexOf(s); // triangle has 1 row, triangle_down has 2, square has 3
      x = canvas.width / 4 + cols * (32 + 4);
      y = canvas.height / 4 - 35 + rows * (36 + 4);
      accelerator = rows % 2 ? 0.6 : 0.45;
      enemies.push({
        shape: s,
        w: 32, h: 32, x, y, vx: 0.3 * accelerator, vy: 0, color: enemyColors[Math.floor(Math.random() * enemyColors.length)]
      });
    }
  }
}

function resetWave() {
  createEnemies();
}
resetWave();

/* bullets */
const bullets = [];
const enemyBullets = [];

function shoot(type) {
  if (type === 'player') {
    bullets.push({ 
      x: player.x + player.w / 2 - 2, 
      y: player.y, 
      vx: 0, 
      vy: -10, 
      type: 'player',
      w: 4,
      h: 4
    });
    // play a short beep using the Web Audio API
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.value = 0.15;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.stop(ctx.currentTime + 0.15);
  }
}

function drawBullet(bullet) {
  ctx.fillStyle = bullet.type === 'player' ? '#00FF00' : '#FF0000';
  ctx.fillRect(bullet.x, bullet.y, 4, 4);
}

/* collision */
function rectCollide(a, b) {
  // a = bullet, b = enemy
  const ax = a.x;
  const ay = a.y;
  const aw = a.w;
  const ah = a.h;
  const bx = b.x;
  const by = b.y;
  const bw = b.w;
  const bh = b.h;

  return (
    ax < bx + bw &&
    ax + aw > bx &&
    ay < by + bh &&
    ay + ah > by
  );
}

/* game state */
let score = 0;
let gameOver = false;

/* particle explosion */
function createExplosion(x, y, color) {
  for (let i = 0; i < 16; i++) {
    const angle = (Math.PI * 2 * i) / 16;
    const speed = Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      w: 4, h: 4,
      color,
      life: 30
    });
  }
  // play a short explosion sound
  playExplosionSound(color);
}

function playExplosionSound(color) {
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = 120;
  gain.gain.value = 0.12;
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.stop(ctx.currentTime + 0.2);
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.w, p.h);
  });
}

/* game loop */
function update(dt) {
  if (gameOver) return;

  player.move();

  /* enemy movement + shooting */
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.x += e.vx * dt * 60;
    e.y += e.vy * dt * 60;

    // Clamp horizontal bounds and bounce if hitting edge
    if (e.x <= 0 || e.x >= canvas.width - e.w) {
      e.vx = -e.vx; // Reverse direction on hit
    }

    // Clamp vertical bounds (already handled in original logic)
    e.y = Math.max(0, Math.min(canvas.height - e.h, e.y));

    if (Math.random() < 0.005) {
      enemyBullets.push({ x: e.x + e.w / 2 - 2, y: e.y + e.h, vx: 0, vy: 5, type: 'enemy', w: 4, h: 4 });
    }

    if (e.y > canvas.height) {
      enemies.splice(i, 1);
    } else if (rectCollide(e, player)) {
      gameOver = true;
    }
  }

  if (enemies.length === 0) {
    resetWave();
  }

  // player bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt * 60;
    b.y += b.vy * dt * 60;
    if (b.y < 0) {
      bullets.splice(i, 1);
      continue;
    }
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (rectCollide(b, e)) {
        console.log("💥 BULLET HIT ENEMY!", {
          bullet: { x: b.x, y: b.y },
          enemy: { x: e.x, y: e.y },
          bulletW: b.w, bulletH: b.h,
          enemyW: e.w, enemyH: e.h
        });
        score += 10;
        createExplosion(e.x + e.w / 2, e.y + e.h / 2, e.color);
        enemies.splice(j, 1);
        bullets.splice(i, 1);
        break;
      }
    }
  }

  // enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx * dt * 60;
    b.y += b.vy * dt * 60;
    if (b.y > canvas.height) {
      enemyBullets.splice(i, 1);
      continue;
    }
    console.log("ENEMY BULLET HIT PLAYER!");
    if (rectCollide(b, player)) {
      createExplosion(player.x + player.w / 2, player.y + player.h / 2, '#ff0000');
      gameOver = true;
      enemyBullets.splice(i, 1);
    }
  }

  updateParticles();

  if (enemies.length === 0 && !gameOver) {
    resetWave();
  }
}

function draw() {
  ctx.fillStyle = '#222';
  //ctx.fillRect(0, 0, canvas.width, canvas.height);

  player.draw();
  enemies.forEach(drawEnemy);
  bullets.forEach(drawBullet);
  enemyBullets.forEach(drawBullet);
  drawParticles();

  ctx.font = '16px sans-serif';
  if (!gameOver) {
    ctx.fillStyle = '#00FF00';
    ctx.fillText(`Score: ${score}`, 10, 20);
  } else {
    ctx.fillStyle = 'red';
    ctx.font = '32px sans-serif';
    ctx.fillText('GAME OVER', canvas.width / 2 - 90, canvas.height / 2);
    ctx.font = '16px sans-serif';
    ctx.fillText('Press Enter to restart', canvas.width / 2 - 80, canvas.height / 2 + 30);
  }
}

// Nebula background — vanilla JS, canvas2d, no assets
function createNebula(canvas, opts = {}) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const numBlobs   = opts.blobs  || 40;
  const numStars   = opts.stars  || 120;
  const palette    = opts.colors || ['#ff9944','#cc5522','#886622','#442255','#221133'];

  // Precompute static blob params (position, radius, color, drift)
  const blobs = Array.from({ length: numBlobs }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: 80 + Math.random() * 220,
    c: palette[(Math.random() * palette.length) | 0],
    a: 0.06 + Math.random() * 0.10,      // base alpha
    speed: 2 + Math.random() * 0.05,  // drift speed
    phase: Math.random() * Math.PI * 2,
    driftR: 100 + Math.random() * 40      // drift radius
  }));

  const stars = Array.from({ length: numStars }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.4 + 0.2,
    tw: Math.random() * Math.PI * 2,     // twinkle phase
    speed: 0.02 + Math.random() * 0.04,
    hue: Math.random() < 0.15 ? '#aad5ff' : '#ffffff'
  }));

  // Offscreen buffer so we don't redraw 40 gradients every frame at full res
  const buf = document.createElement('canvas');
  buf.width = W; buf.height = H;
  const bctx = buf.getContext('2d');

  function drawNebula(t) {
    bctx.clearRect(0, 0, W, H);
    bctx.globalCompositeOperation = 'lighter'; // additive glow
    for (const b of blobs) {
      const dx = Math.cos(t * b.speed + b.phase) * b.driftR;
      const dy = Math.sin(t * b.speed * 0.8 + b.phase) * b.driftR;
      const g = bctx.createRadialGradient(
        b.x + dx, b.y + dy, 0,
        b.x + dx, b.y + dy, b.r
      );
      g.addColorStop(0, b.c);
      g.addColorStop(1, 'transparent');
      bctx.globalAlpha = b.a;
      bctx.fillStyle = g;
      bctx.beginPath();
      bctx.arc(b.x + dx, b.y + dy, b.r, 0, 6.283);
      bctx.fill();
    }
    bctx.globalAlpha = 1;
    bctx.globalCompositeOperation = 'source-over';
  }

  function render(t) {
    // background base
    ctx.fillStyle = '#050303';
    ctx.fillRect(0, 0, W, H);

    // redraw nebula buffer occasionally (cheap animation, not every frame)
    if (!render._last || t - render._last > 50) {
      drawNebula(t * 0.001);
      render._last = t;
    }
    ctx.drawImage(buf, 0, 0);

    // stars with twinkle
    for (const s of stars) {
      const tw = 0.5 + 0.5 * Math.sin(t * s.speed + s.tw);
      ctx.globalAlpha = 0.3 + tw * 0.7;
      ctx.fillStyle = s.hue;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, 6.283);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  return { render };
}

// --- usage ---
const nebula = createNebula(canvas, { blobs: 40, stars: 50 });


let paused = false;

function gameLoop(t) {
  if (!paused) {
    update(1 / 60);
    nebula.render(t);
    draw();
  }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

/* pause / restart */
window.addEventListener('keydown', e => {
  if (e.code === 'Escape') {
    paused = !paused;
    if (paused) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = '32px sans-serif';
      ctx.fillText('Paused', canvas.width / 2 - 55, canvas.height / 2);
    }
  } else if (e.code === 'Enter' && gameOver) {
    score = 0;
    gameOver = false;
    bullets.length = 0;
    enemyBullets.length = 0;
    particles.length = 0;
    player.x = canvas.width / 2 - 24;
    resetWave();
  }
});
</script>
</body>
</html>
